<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Playwright validation workflow</title>
<style>
  body {
    margin: 0;
    padding: 40px 20px;
    background: #F7F6F2;
    font-family: -apple-system, "Segoe UI", Arial, sans-serif;
    display: flex;
    justify-content: center;
  }
  .card {
    background: #FFFFFF;
    border: 1px solid #E3E1D8;
    border-radius: 12px;
    padding: 32px;
    max-width: 720px;
    width: 100%;
    box-sizing: border-box;
  }
  h1 {
    font-size: 18px;
    font-weight: 500;
    color: #2C2C2A;
    margin: 0 0 20px;
  }
  svg { display: block; width: 100%; height: auto; }
  .t  { font-size: 14px; font-weight: 400; }
  .ts { font-size: 12px; font-weight: 400; }
  .th { font-size: 14px; font-weight: 500; }
  rect { stroke-width: 0.5; }

  .c-gray  rect { fill: #F1EFE8; stroke: #5F5E5A; }
  .c-gray  text { fill: #2C2C2A; }
  .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple text { fill: #26215C; }
  .c-teal  rect { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal  text { fill: #04342C; }
  .c-coral rect { fill: #FAECE7; stroke: #993C1D; }
  .c-coral text { fill: #4A1B0C; }
  .c-red   rect { fill: #FCEBEB; stroke: #A32D2D; }
  .c-red   text { fill: #501313; }
  .c-green rect { fill: #EAF3DE; stroke: #3B6D11; }
  .c-green text { fill: #173404; }

  .t.sub, .ts { fill: currentColor; opacity: 0.75; }
  .diamond { fill: none; stroke: #888780; }
  .label { fill: #444441; }
  .arr { stroke: #73726C; stroke-width: 1.5; }
</style>
</head>
<body>
<div class="card">
  <h1>Playwright validation workflow</h1>
  <svg viewBox="0 0 680 620" role="img">
    <title>Playwright validation workflow</title>
    <desc>Flowchart showing how Playwright would automate data validation between the CMC dashboard and Smartsheet</desc>
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="#73726C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
    </defs>

    <g class="c-gray">
      <rect x="240" y="20" width="200" height="44" rx="8"/>
      <text class="th" x="340" y="42" text-anchor="middle" dominant-baseline="central">Scheduled trigger</text>
    </g>
    <line x1="340" y1="64" x2="340" y2="100" class="arr" marker-end="url(#arrow)"/>

    <g class="c-purple">
      <rect x="220" y="100" width="240" height="44" rx="8"/>
      <text class="th" x="340" y="122" text-anchor="middle" dominant-baseline="central">Launch headless browser</text>
    </g>
    <line x1="340" y1="144" x2="340" y2="180" class="arr" marker-end="url(#arrow)"/>
    <text class="ts label" x="340" y="172" text-anchor="middle">Navigates to both sources</text>

    <line x1="340" y1="180" x2="180" y2="220" class="arr" marker-end="url(#arrow)"/>
    <line x1="340" y1="180" x2="500" y2="220" class="arr" marker-end="url(#arrow)"/>

    <g class="c-teal">
      <rect x="60" y="220" width="240" height="56" rx="8"/>
      <text class="th" x="180" y="238" text-anchor="middle" dominant-baseline="central">Read CMC dashboard</text>
      <text class="ts" x="180" y="256" text-anchor="middle" dominant-baseline="central">Rendered, JS-calculated values</text>
    </g>

    <g class="c-teal">
      <rect x="380" y="220" width="240" height="56" rx="8"/>
      <text class="th" x="500" y="238" text-anchor="middle" dominant-baseline="central">Read Smartsheet source</text>
      <text class="ts" x="500" y="256" text-anchor="middle" dominant-baseline="central">Source-of-truth figures</text>
    </g>

    <line x1="180" y1="276" x2="180" y2="320" class="arr" marker-end="url(#arrow)"/>
    <line x1="500" y1="276" x2="500" y2="320" class="arr" marker-end="url(#arrow)"/>
    <line x1="180" y1="320" x2="300" y2="320" class="arr"/>
    <line x1="500" y1="320" x2="380" y2="320" class="arr"/>

    <g class="c-coral">
      <rect x="220" y="320" width="240" height="56" rx="8"/>
      <text class="th" x="340" y="338" text-anchor="middle" dominant-baseline="central">Compare field by field</text>
      <text class="ts" x="340" y="356" text-anchor="middle" dominant-baseline="central">Checks against expected match</text>
    </g>
    <line x1="340" y1="376" x2="340" y2="412" class="arr" marker-end="url(#arrow)"/>

    <polygon class="diamond" points="340,412 420,452 340,492 260,452"/>
    <text class="t label" x="340" y="452" text-anchor="middle" dominant-baseline="central">Match?</text>

    <line x1="420" y1="452" x2="480" y2="452" class="arr" marker-end="url(#arrow)"/>
    <text class="ts label" x="450" y="440" text-anchor="middle">No</text>
    <g class="c-red">
      <rect x="480" y="424" width="160" height="56" rx="8"/>
      <text class="th" x="560" y="442" text-anchor="middle" dominant-baseline="central">Alert the team</text>
      <text class="ts" x="560" y="460" text-anchor="middle" dominant-baseline="central">Slack, email, or ticket</text>
    </g>

    <line x1="340" y1="492" x2="340" y2="528" class="arr" marker-end="url(#arrow)"/>
    <text class="ts label" x="370" y="512" text-anchor="middle">Yes</text>
    <g class="c-green">
      <rect x="220" y="528" width="240" height="44" rx="8"/>
      <text class="th" x="340" y="550" text-anchor="middle" dominant-baseline="central">Log run as passed</text>
    </g>
  </svg>
</div>
</body>
</html>

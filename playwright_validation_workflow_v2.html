<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Phase 3 data integrity check</title>
<style>
  body {
    margin: 0;
    padding: 40px 20px;
    background: #F7F6F2;
    font-family: -apple-system, "Segoe UI", Arial, sans-serif;
    display: flex;
    justify-content: center;
  }
  .card {
    background: #FFFFFF;
    border: 1px solid #E3E1D8;
    border-radius: 12px;
    padding: 32px;
    max-width: 760px;
    width: 100%;
    box-sizing: border-box;
  }
  h1 {
    font-size: 18px;
    font-weight: 500;
    color: #2C2C2A;
    margin: 0 0 4px;
  }
  h2 {
    font-size: 13px;
    font-weight: 400;
    color: #6B6A64;
    margin: 0 0 20px;
  }
  svg { display: block; width: 100%; height: auto; }
  .t  { font-size: 14px; font-weight: 400; }
  .ts { font-size: 11.5px; font-weight: 400; }
  .th { font-size: 14px; font-weight: 500; }
  .tn { font-size: 11px; font-weight: 400; font-style: italic; }
  rect { stroke-width: 0.5; }

  .c-gray  rect { fill: #F1EFE8; stroke: #5F5E5A; }
  .c-gray  text { fill: #2C2C2A; }
  .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple text { fill: #26215C; }
  .c-teal  rect { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal  text { fill: #04342C; }
  .c-coral rect { fill: #FAECE7; stroke: #993C1D; }
  .c-coral text { fill: #4A1B0C; }
  .c-red   rect { fill: #FCEBEB; stroke: #A32D2D; }
  .c-red   text { fill: #501313; }
  .c-green rect { fill: #EAF3DE; stroke: #3B6D11; }
  .c-green text { fill: #173404; }
  .c-scope rect { fill: #FFFFFF; stroke: #B9B7AC; stroke-dasharray: 4 3; }
  .c-scope text { fill: #4A4A45; }
  .c-note  rect { fill: #FBFAF6; stroke: #D8D6CC; stroke-dasharray: 2 2; }
  .c-note  text { fill: #55544E; }

  .t.sub, .ts { fill: currentColor; opacity: 0.8; }
  .diamond { fill: none; stroke: #888780; }
  .label { fill: #444441; }
  .arr { stroke: #73726C; stroke-width: 1.5; }
</style>
</head>
<body>
<div class="card">
  <h1>Phase 3 data integrity check</h1>
  <h2>Quarterly spend &amp; milestone validation — dashboard vs. Smartsheet</h2>
  <svg viewBox="0 0 720 980" role="img">
    <title>Phase 3 data integrity check</title>
    <desc>Flowchart showing how an automated script validates quarterly spend and milestone data between the Phase 3 dashboard and Smartsheet</desc>
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="#73726C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
    </defs>

    <!-- Scope callout -->
    <g class="c-scope">
      <rect x="40" y="12" width="640" height="66" rx="8"/>
      <text class="th" x="60" y="34" dominant-baseline="central">Scope for Phase 3</text>
      <text class="ts" x="60" y="53" dominant-baseline="central">In scope: milestones "First Registration/Dose" and "First Assumption" only</text>
      <text class="ts" x="60" y="69" dominant-baseline="central">Out of scope: FHD and FRE milestones (owned by Phase 1 / Phase 2)</text>
    </g>

    <line x1="360" y1="78" x2="360" y2="108" class="arr" marker-end="url(#arrow)"/>

    <g class="c-gray">
      <rect x="260" y="108" width="200" height="44" rx="8"/>
      <text class="th" x="360" y="130" text-anchor="middle" dominant-baseline="central">Scheduled trigger</text>
    </g>
    <line x1="360" y1="152" x2="360" y2="188" class="arr" marker-end="url(#arrow)"/>

    <g class="c-purple">
      <rect x="230" y="188" width="260" height="52" rx="8"/>
      <text class="th" x="360" y="206" text-anchor="middle" dominant-baseline="central">Run automated check script</text>
      <text class="ts" x="360" y="224" text-anchor="middle" dominant-baseline="central">Opens both data sources — no manual clicking</text>
    </g>
    <g class="c-note">
      <rect x="500" y="184" width="180" height="60" rx="6"/>
      <text class="tn" x="512" y="200">Runs in Python.</text>
      <text class="tn" x="512" y="215">Independent of AI drafting —</text>
      <text class="tn" x="512" y="230">keeps audit separate from</text>
      <text class="tn" x="512" y="243">content generation.</text>
    </g>

    <line x1="360" y1="240" x2="200" y2="280" class="arr" marker-end="url(#arrow)"/>
    <line x1="360" y1="240" x2="520" y2="280" class="arr" marker-end="url(#arrow)"/>

    <g class="c-teal">
      <rect x="60" y="280" width="280" height="72" rx="8"/>
      <text class="th" x="200" y="300" text-anchor="middle" dominant-baseline="central">Read Phase 3 dashboard</text>
      <text class="ts" x="200" y="317" text-anchor="middle" dominant-baseline="central">Quarterly spend ask, cumulative</text>
      <text class="ts" x="200" y="331" text-anchor="middle" dominant-baseline="central">approved, spend vs. target</text>
    </g>

    <g class="c-teal">
      <rect x="380" y="280" width="280" height="72" rx="8"/>
      <text class="th" x="520" y="300" text-anchor="middle" dominant-baseline="central">Read Smartsheet source</text>
      <text class="ts" x="520" y="317" text-anchor="middle" dominant-baseline="central">Source-of-truth figures, timeline,</text>
      <text class="ts" x="520" y="331" text-anchor="middle" dominant-baseline="central">and in-scope milestones</text>
    </g>

    <line x1="200" y1="352" x2="200" y2="392" class="arr" marker-end="url(#arrow)"/>
    <line x1="520" y1="352" x2="520" y2="392" class="arr" marker-end="url(#arrow)"/>
    <line x1="200" y1="392" x2="320" y2="392" class="arr"/>
    <line x1="520" y1="392" x2="400" y2="392" class="arr"/>

    <g class="c-coral">
      <rect x="220" y="392" width="280" height="100" rx="8"/>
      <text class="th" x="360" y="410" text-anchor="middle" dominant-baseline="central">Compare field by field</text>
      <text class="ts" x="360" y="428" text-anchor="middle" dominant-baseline="central">Tier 1 (dollar figures, dates) vs.</text>
      <text class="ts" x="360" y="443" text-anchor="middle" dominant-baseline="central">Tier 2 (notes, labels) — debating</text>
      <text class="ts" x="360" y="458" text-anchor="middle" dominant-baseline="central">vs. non-debating fields</text>
      <text class="ts" x="360" y="476" text-anchor="middle" dominant-baseline="central">Catches: paraphrasing, rewording, truncation</text>
    </g>
    <line x1="360" y1="492" x2="360" y2="528" class="arr" marker-end="url(#arrow)"/>

    <polygon class="diamond" points="360,528 440,568 360,608 280,568"/>
    <text class="t label" x="360" y="568" text-anchor="middle" dominant-baseline="central">Match?</text>

    <line x1="440" y1="568" x2="500" y2="568" class="arr" marker-end="url(#arrow)"/>
    <text class="ts label" x="470" y="556" text-anchor="middle">No</text>
    <g class="c-red">
      <rect x="500" y="540" width="180" height="56" rx="8"/>
      <text class="th" x="590" y="558" text-anchor="middle" dominant-baseline="central">Alert the team</text>
      <text class="ts" x="590" y="576" text-anchor="middle" dominant-baseline="central">Slack, email, or ticket with diff</text>
    </g>

    <line x1="360" y1="608" x2="360" y2="644" class="arr" marker-end="url(#arrow)"/>
    <text class="ts label" x="390" y="628" text-anchor="middle">Yes</text>
    <g class="c-green">
      <rect x="240" y="644" width="240" height="44" rx="8"/>
      <text class="th" x="360" y="666" text-anchor="middle" dominant-baseline="central">Log run as passed</text>
    </g>

    <line x1="360" y1="688" x2="360" y2="716" class="arr" marker-end="url(#arrow)"/>
    <g class="c-note">
      <rect x="120" y="716" width="480" height="80" rx="6"/>
      <text class="tn" x="360" y="736" text-anchor="middle">Note: milestone comparison is limited to Phase 3 scope.</text>
      <text class="tn" x="360" y="754" text-anchor="middle">FHD / FRE dates are not checked here even if present in</text>
      <text class="tn" x="360" y="772" text-anchor="middle">Smartsheet, since they belong to Phase 1 / Phase 2 tracking</text>
      <text class="tn" x="360" y="790" text-anchor="middle">and are out of this dashboard's scope.</text>
    </g>
  </svg>
</div>
</body>
</html>
